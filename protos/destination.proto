

syntax = "proto3";
package meshScale;


message Destination
{
  /*
  Enums/messages for Instruction proto module
  */
  enum DestinationAttributes
  {
    DESTIANTION_HASH = 0;
  }
  message DestinationValues
  {
    oneof value
    {
      DestinationHash destination_hash = 1;
    }
  }
  message DestinationCommands
  {
    /*
     oneof command
     {

     }
     */
  }

  // 16 byte array for a destination hash
  message DestinationHash
  {
      bytes hash = 1;
  }
}

