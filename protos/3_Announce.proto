
syntax = "proto3";
package meshScale;

import "3_Destination.proto";
import "3_Identity.proto";

message Announce
{
  /*
   Enums/messages for Instruction proto module
   */
  enum AnnounceAttributes
  {
    NONE = 0;
    //auto-announce config attr
  }
  message AnnounceValues
  {
    /*
     oneof value
     {
     //auto-announce config value
     }
     */
  }
  message AnnounceCommands
  {
    oneof command
    {
      DoAnnounceCommand do_announce_command = 1;
    }
  }

  //Announce once
  message DoAnnounceCommand{}

  /*
   Announce events
   */
  message AnnounceEvents
  {
    oneof announce_event
    {
      IncomingAnnounce incoming_announce = 5;
    }
  }
  message IncomingAnnounce
  {
    Destination.DestinationHash destination_hash = 1;
    Identity.IdentityKeys       public_keys      = 2;
    // extra data like username
    // random blob
    // signature
    // ...
  }

}