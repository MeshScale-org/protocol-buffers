
syntax = "proto3";
package meshScale;

message IdentityAction {

  oneof config_action
  {
    SetIdentity set_identity = 1;
    GetIdentity get_identity = 2;
    ClearIdentity clear_identity = 3;
  }
}



message SetIdentity
{
  enum IdentityLocation {
  MANAGER_SYSTEM = 0; //The full identity is stored on the device (standalone node)
  CLIENT_EXTERNAL = 1; // Private keys are stored on client phone, request client to sign, encrypt, ... (untrusted firmware)
  MANAGER_CLIENT = 2; //Private key is owned by client phone but a local copy was made for local signing (trusted firmware)
  }

  IdentityLocation identity_location = 1;
  bytes public_keys = 2;
  optional bytes private_keys = 3;
}

message GetIdentity{}

message ClearIdentity{}
